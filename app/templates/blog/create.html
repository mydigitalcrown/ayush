{% extends "base.html" %}

{% block title %}Create Post - My Blog{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Create New Post</h1>
    
    <form method="POST" action="{{ url_for('blog.create_post') }}" class="blog-form">
        <div class="form-group">
            <label for="title">Post Title</label>
            <input type="text" id="title" name="title" required placeholder="Enter post title">
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" value="Admin" placeholder="Author name">
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" value="General" placeholder="Post category">
            </div>
        </div>
        
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" required rows="15" placeholder="Write your post content here..."></textarea>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn">Publish Post</button>
            <a href="{{ url_for('blog.list_posts') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
