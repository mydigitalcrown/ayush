{% extends "base.html" %}

{% block title %}Edit Post - My Blog{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Edit Post</h1>
    
    <form method="POST" action="{{ url_for('blog.edit_post', post_id=post.id) }}" class="blog-form">
        <div class="form-group">
            <label for="title">Post Title</label>
            <input type="text" id="title" name="title" required value="{{ post.title }}">
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" value="{{ post.author }}">
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" value="{{ post.category }}">
            </div>
        </div>
        
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" required rows="15">{{ post.content }}</textarea>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{{ url_for('blog.view_post', post_id=post.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
